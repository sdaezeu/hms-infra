name: Deploy HMS Infra

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

          echo "🚀 Deploying HMS..."

          if [ ! -d "/var/www/hms-infra" ]; then
            git clone https://github.com/sdaezeu/hms-infra.git /var/www/hms-infra
          fi

          cd /var/www/hms-infra
          git pull origin main

          docker compose pull
          docker compose up -d

          echo "✅ Deployment complete!"

          EOF
